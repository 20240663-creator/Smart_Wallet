<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Wallet - Transactions</title>
    <link rel="stylesheet" href="../static/css/style.css" />
</head>
<body id="transaction-page">
    <header id="transaction-header">
        <div class="logo">💰 Smart Wallet</div>
        <div class="transaction-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="intro.html" class="nav-link">Logout</a>
        </div>
    </header>

    <main class="transaction-container">
        <section class="transaction-card">
            <h1>Recent Transactions</h1>
            <p class="subheading">Track and manage every transaction in one secure place.</p>

            <table class="transaction-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Balance</th>
                    </tr>
                </thead>
                <tbody>
                    
                        <tr>
                            <td>May 1, 2026</td>
                            <td>Completed</td>
                            <td>Send</td>
                            <td class="amount amount-negative">-50.00</td>
                            <td>$6950.00</td>
                        </tr>
                        <tr>
                            <td colspan="5" class="empty-state">No transactions found yet. Start by adding one.</td>
                        </tr>
                </tbody>
            </table>

        </section>
    </main>

    <footer id="transaction-footer">
        <p>&copy; 2026 Smart Wallet. All rights reserved.</p>
    </footer>
</body>
</html>
