<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Wallet - User Profile</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body id="profile-body">
<header id="profile-header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>💰 Smart Wallet</div>
      <div><a href="/" style="color:white;text-decoration:underline;margin-right:20px;">Home</a><a href="/intro/" style="color:white;text-decoration:underline;">Logout</a></div>
    </div>
</header>
<div class="container" id="profile-container">
    <div class="card" id="profile-card">
        <h1>User Profile</h1>
        <p class="profile-label">Name</p>
        <p class="profile-value">John Doe</p>

        <p class="profile-label">Email</p>
        <p class="profile-value">john@example.com</p>

        <p class="profile-label">Member since</p>
        <p class="profile-value">January 1, 2023, 12:00 pm</p>

        <p class="profile-label">Last updated</p>
        <p class="profile-value">May 1, 2026, 10:00 am</p>

        <a href="#" class="btn-edit">Edit Profile</a>
    </div>
</div>
<footer>
    <p>&copy; 2026 Smart Wallet</p>
</footer>
</body>
</html>
