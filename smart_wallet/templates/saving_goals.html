<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving Goals - Smart Wallet</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body id="goals-body">
    <header id="goals-header">
        <nav id="goals-nav">
            <div class="logo">💰 Smart Wallet</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="budget.html">Budgets</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="advisor.html">Advisor</a></li>
                <li><a href="notifications.html">Notifications</a></li>
                <li><a href="profile.html">Profile</a></li>
            </ul>
        </nav>
    </header>

    <div class="goals-container">
        <div class="goals-header">
            <h1>Saving Goals</h1>
            <button class="add-goal-btn" onclick="toggleForm()">+ Create Goal</button>
        </div>

        <!-- Goals Statistics -->
        <div class="goals-stats" id="goalsStats">
            <div class="stats-card">
                <div class="stats-label">Total Saved</div>
                <div class="stats-value" id="totalSaved">$4,250</div>
            </div>
            <div class="stats-card">
                <div class="stats-label">Total Target</div>
                <div class="stats-value" id="totalTarget">$10,000</div>
            </div>
            <div class="stats-card">
                <div class="stats-label">Goals Completed</div>
                <div class="stats-value" id="completedCount">2</div>
            </div>
            <div class="stats-card">
                <div class="stats-label">Active Goals</div>
                <div class="stats-value" id="activeCount">3</div>
            </div>
        </div>

        <!-- New Goal Form (ADDED missing IDs for goals.js) -->
        <div class="goal-form" id="goalForm">
            <h2 style="margin-bottom: 20px;">Create New Saving Goal</h2>
            <div class="form-group">
                <label>Goal Name</label>
                <input type="text" id="goalName" placeholder="e.g., Vacation Fund" class="form-control" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Target Amount</label>
                    <input type="number" id="goalTarget" placeholder="Enter target amount" class="form-control" />
                </div>
                <div class="form-group">
                    <label>Target Date</label>
                    <input type="date" id="goalDate" class="form-control" />
                </div>
            </div>
            <div class="form-buttons">
                <button class="form-btn cancel" onclick="toggleForm()">Cancel</button>
                <button class="form-btn save" onclick="createSavingGoal()">Create Goal</button>
            </div>
        </div>

        <!-- Goals List (where JS will inject goals) -->
        <div id="goalsList"></div>
    </div>

    <!-- Contribute Modal (for goals.js) -->
    <div id="contributeModal" class="modal">
        <div class="modal-content">
            <h3>💰 Contribute to Goal</h3>
            <div class="form-group">
                <label>Amount to Contribute</label>
                <input type="number" id="contributeAmount" class="form-control" placeholder="Enter amount" />
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-secondary" onclick="closeContributeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitContribution()">Contribute</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Smart Wallet. All rights reserved.</p>
    </footer>

    <script src="../static/js/config.js"></script>
    <script src="../static/js/auth.js"></script>
    <script src="../static/js/goals.js"></script>
    
    <script>
        function toggleForm() {
            document.getElementById('goalForm').classList.toggle('active');
        }
        
        function closeContributeModal() {
            document.getElementById('contributeModal').classList.remove('active');
        }
        
        function submitContribution() {
            const amount = document.getElementById('contributeAmount').value;
            if (amount && currentGoalId) {
                contributeToGoal(currentGoalId, parseFloat(amount));
                document.getElementById('contributeModal').classList.remove('active');
                document.getElementById('contributeAmount').value = '';
            }
        }
    </script>
</body>
</html>
